# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Android CI — runs on every Pull Request to main/develop
# Builds debug APK + runs unit tests + uploads artifact
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
name: Android CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/android-ci.yml'
  push:
    branches: [develop]
    paths:
      - 'app/**'

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test & Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Java ──────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Gradle Cache ─────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── google-services.json ─────────────────────────────────
      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      # ── Permissions ───────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── Unit Tests ────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # ── Test Report ───────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7

      # ── Build Debug APK ───────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── Upload APK ────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: samachardaily-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # ── PR Comment ────────────────────────────────────────────
      - name: Comment APK size on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'app/build/outputs/apk/debug/app-debug.apk';
            const size = fs.statSync(path).size;
            const sizeMB = (size / 1024 / 1024).toFixed(2);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📱 **Debug APK built successfully**\n\nSize: **${sizeMB} MB**\n\nCommit: \`${context.sha.substring(0,7)}\`\n\n[Download artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });

